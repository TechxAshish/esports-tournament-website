<!DOCTYPE html>
<html>

<head>

<title>Tournament Payment</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<h2>Tournament Entry Payment</h2>

<form id="paymentForm">

<input type="text" id="playerName" placeholder="Player Name" required>

<input type="email" id="email" placeholder="Email" required>

<input type="text" id="bankName" placeholder="Bank Name" required>

<input type="text" id="accountNumber" placeholder="Account Number" required>

<input type="text" id="ifsc" placeholder="IFSC Code" required>

<button type="submit">Complete Payment</button>

</form>

<script src="js/script.js"></script>

</body>

</html>
